<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede6;
      --muted: rgba(240,237,230,0.45);
      --accent: #c8f060;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow behind hero text */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(200,240,96,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 4rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 80px rgba(0,0,0,0.5);

      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,240,96,0.1);
      border: 1px solid rgba(200,240,96,0.2);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin: 1.2rem 0 2.4rem;
    }

    .btn {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: #0e0e0e;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: rgba(240,237,230,0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">GitHub Pages</div>
    <h1>Hello, <em>World.</em></h1>
    <p class="subtitle">
      Your site is live. This is a placeholder — the real thing is coming soon.
    </p>
    <a href="my-page/" class="btn">Go to my page →</a>
    <p class="footer-note">index.html · replace this with whatever you like</p>
  </div>
</body>
</html>
